services:
  postgres:
    image: postgres:18
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql # Updated mount point for Postgres 18+
    shm_size: 128mb
    restart: always
  pgadmin:
    image: dpage/pgadmin4:latest # Use the latest pgAdmin 4 image
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - '8080:80' # Access pgAdmin in your browser via http://localhost:8080
    volumes:
      - pgadmin_data:/var/lib/pgadmin # Ensure pgAdmin config persistence
    depends_on:
      - postgres # Ensures postgres starts first

volumes:
  postgres_data:
  pgadmin_data:
